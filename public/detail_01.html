<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>25th The Legacy — MIR 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,800;1,400;1,800&family=Syne:wght@400;700;800&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:   #0c0b09;
  --ink:  #f0ebe0;
  --ink2: rgba(240,235,224,.38);
  --ink3: rgba(240,235,224,.1);
  --gold: #c9a96e;
  --serif:'EB Garamond', serif;
  --sans: 'Syne', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:var(--bg); color:var(--ink);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ─── CLOSE BUTTON ─── */
#back-btn {
  position:fixed; top:24px; right:24px; z-index:999;
  display:flex; align-items:center; gap:8px;
  font-family:'Inter', ui-sans-serif, system-ui, sans-serif;
  font-size:12px; font-weight:600;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--ink);
  background:none; border:none; padding:8px;
  cursor:pointer;
  transition:color .22s;
}
#back-btn:hover { color:#d4af37; }

/* ─── LAYOUT ─── */
.detail {
  display:grid;
  grid-template-columns:50% 50%;
  width:100%; height:100%;
}

/* ─── LEFT: IMAGE ─── */
.dv-vis {
  position:relative; overflow:hidden; background:#000;
}
.dv-vis img {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover; object-position:center top;
  opacity:.85;
}
.dv-vis::after {
  content:''; position:absolute; inset:0; z-index:2;
  background:linear-gradient(90deg,transparent 40%,var(--bg) 100%);
}
.dv-vis::before {
  content:''; position:absolute; inset:0; z-index:3; pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.022) 3px,rgba(255,255,255,.022) 4px);
}

/* ─── RIGHT: TEXT ─── */
.dv-body {
  display:flex; flex-direction:column; justify-content:center;
  padding:80px 60px 80px 44px;
}
.dv-eyebrow {
  font-family:var(--sans); font-size:9px; font-weight:700;
  letter-spacing:.26em; text-transform:uppercase; color:var(--gold);
  display:flex; align-items:center; gap:14px; margin-bottom:14px;
}
.dv-eyebrow::before { content:''; width:30px; height:1px; background:var(--gold); }
.dv-t {
  font-family:var(--serif); font-weight:800; line-height:.92;
  letter-spacing:-.02em; color:var(--ink);
  font-size:clamp(46px,5vw,80px); margin-bottom:6px;
}
.dv-t em { font-style:italic; color:var(--gold); }
.dv-sub {
  font-family:var(--serif); font-style:italic;
  font-size:clamp(14px,1.4vw,19px); color:var(--ink2);
  margin-bottom:28px; letter-spacing:.02em;
}
.dv-tags { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:24px; }
.dv-tag {
  padding:4px 12px; border:1px solid var(--ink3);
  font-family:var(--sans); font-size:9px; font-weight:400;
  letter-spacing:.18em; text-transform:uppercase; color:var(--ink2);
}
.dv-tag.hi { border-color:var(--gold); color:var(--gold); }
.dv-srow { display:flex; align-items:center; gap:20px; margin-bottom:24px; }
.dv-snum {
  font-family:var(--serif); font-weight:800; font-size:54px;
  color:var(--ink); line-height:1;
}
.dv-snum span { font-size:16px; color:var(--ink2); }
.dv-bwrap { flex:1; }
.dv-blbl {
  font-family:var(--sans); font-size:8px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--ink2); margin-bottom:8px;
  display:flex; justify-content:space-between;
}
.dv-track { height:1px; background:var(--ink3); position:relative; overflow:hidden; }
.dv-fill {
  position:absolute; top:0; left:0; height:100%;
  background:linear-gradient(90deg,var(--gold),#e8b87a);
  width:0%; transition:width 1.1s cubic-bezier(.165,.84,.44,1) .3s;
}
.dv-desc {
  font-family:var(--serif); font-size:15px; line-height:1.82;
  color:var(--ink2); max-width:360px; margin-bottom:36px;
}
.dv-cta { display:flex; gap:12px; }
.btn-p {
  padding:13px 32px; background:var(--ink); color:var(--bg);
  font-family:var(--sans); font-size:9px; font-weight:700;
  letter-spacing:.22em; text-transform:uppercase;
  border:none; cursor:pointer; transition:background .2s;
}
.btn-p:hover { background:#d8d0c0; }
.btn-w {
  padding:13px 22px; background:transparent;
  border:1px solid var(--ink3); color:var(--ink2);
  font-family:var(--sans); font-size:9px; font-weight:400;
  letter-spacing:.18em; text-transform:uppercase;
  cursor:pointer; transition:border-color .22s, color .22s;
}
.btn-w:hover { border-color:var(--ink); color:var(--ink); }

/* ─── MOBILE ─── */
@media(max-width:768px){
  .detail { grid-template-columns:1fr; }
  .dv-vis { height:45vh; }
  .dv-body { padding:40px 24px 40px; }
  body { overflow-y:auto; }
}

/* ─── ENTER / EXIT ANIMATION ─── */
@keyframes expandIn {
  from { clip-path: inset(50% 50% 50% 50%); }
  to   { clip-path: inset(0% 0% 0% 0%); }
}
@keyframes collapseOut {
  from { clip-path: inset(0% 0% 0% 0%); }
  to   { clip-path: inset(50% 50% 50% 50%); }
}
body {
  animation: expandIn .85s cubic-bezier(.77,0,.175,1) forwards;
}
body.exiting {
  animation: collapseOut .85s cubic-bezier(.77,0,.175,1) forwards;
  pointer-events: none;
}
/* body text slides in from right, same as #dv.open .dv-body */
.dv-body {
  opacity: 0;
  transform: translateX(22px);
  animation: bodyIn .6s ease .44s forwards;
}
body.exiting .dv-body {
  animation: none;
}
@keyframes bodyIn {
  to { opacity: 1; transform: translateX(0); }
}
</style>
</head>
<body>

<button id="back-btn">CLOSE ✕</button>

<div class="detail">
  <!-- LEFT: IMAGE -->
  <div class="dv-vis">
    <img src="/img1.jpg" alt="25th The Legacy">
  </div>

  <!-- RIGHT: TEXT -->
  <div class="dv-body">
    <div class="dv-eyebrow">MIR 2</div>
    <div class="dv-t">25TH THE<br><em>LEGACY</em></div>
    <div class="dv-sub">25년의 경이, 멈추지 않는 전설</div>

    <div class="dv-tags">
      <span class="dv-tag hi">2026.03</span>
      <span class="dv-tag">18+</span>
    </div>

    <div class="dv-srow">
      <div class="dv-snum">96<span>/100</span></div>
      <div class="dv-bwrap">
        <div class="dv-blbl"><span>Critic Score</span><span>96/100</span></div>
        <div class="dv-track"><div class="dv-fill" id="fill"></div></div>
      </div>
    </div>

    <p class="dv-desc">25년의 영광을 함께 새긴 위대한 용사들에게</p>

    <div class="dv-cta">
      <button class="btn-p">▶ Play Now</button>
      <button class="btn-w">+ Wishlist</button>
    </div>
  </div>
</div>

<script>
  // Score bar animation
  requestAnimationFrame(() => { document.getElementById('fill').style.width = '96%'; });

  // Notify parent React overlay to hide its CLOSE button
  window.parent.postMessage('detail:open', '*');

  // CLOSE button: animate out → back to game_wemade.html
  document.getElementById('back-btn').addEventListener('click', () => {
    document.body.classList.add('exiting');
    setTimeout(() => {
      window.parent.postMessage('detail:close', '*');
      history.back();
    }, 880);
  });
</script>
</body>
</html>
